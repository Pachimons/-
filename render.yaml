services:
  - type: web
    name: villa-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_API_KEY
        sync: false
      - key: AI_API_BASE
        value: https://api.bltcy.ai/v1
      - key: AI_MODEL
        value: gemini-3.1-pro-preview
      - key: IMAGE_API_KEY
        sync: false
      - key: IMAGE_API_BASE
        value: https://api.bltcy.ai/v1
      - key: IMAGE_MODEL
        value: nano-banana-2
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
